<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2B2B2B"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F57C00"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle top highlight -->
  <rect width="800" height="1" rx="0" fill="#FFFFFF" opacity="0.08" y="0"/>

  <!-- Grid icon (left side) — 3x3 mini dashboard -->
  <g transform="translate(60, 50)">
    <!-- Row 1 -->
    <rect x="0"  y="0"  width="26" height="26" rx="5" fill="#F57C00"/>
    <rect x="32" y="0"  width="26" height="26" rx="5" fill="#F57C00"/>
    <rect x="64" y="0"  width="26" height="26" rx="5" fill="#F57C00"/>
    <!-- Row 2 -->
    <rect x="0"  y="32" width="26" height="26" rx="5" fill="#F57C00"/>
    <rect x="32" y="32" width="26" height="26" rx="5" fill="#FFFFFF"/>
    <rect x="64" y="32" width="26" height="26" rx="5" fill="#F57C00"/>
    <!-- Row 3 -->
    <rect x="0"  y="64" width="26" height="26" rx="5" fill="#F57C00"/>
    <rect x="32" y="64" width="26" height="26" rx="5" fill="#F57C00"/>
    <rect x="64" y="64" width="26" height="26" rx="5" fill="#F57C00"/>
  </g>

  <!-- App name -->
  <text x="190" y="120" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="72" fill="#FFFFFF" letter-spacing="2">Androdash</text>

  <!-- Tagline -->
  <text x="194" y="155" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="20" fill="#B0B0B0">A fast, keyboard-driven Android launcher</text>

  <!-- Accent underline -->
  <rect x="190" y="128" width="120" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Letter buttons decoration (right side) -->
  <g transform="translate(640, 65)" opacity="0.3">
    <rect x="0"  y="0" width="36" height="36" rx="8" fill="#F57C00"/>
    <text x="18" y="26" font-family="sans-serif" font-weight="700" font-size="20" fill="#FFF" text-anchor="middle">A</text>
    <rect x="42" y="0" width="36" height="36" rx="8" fill="#F57C00"/>
    <text x="60" y="26" font-family="sans-serif" font-weight="700" font-size="20" fill="#FFF" text-anchor="middle">N</text>
    <rect x="84" y="0" width="36" height="36" rx="8" fill="#F57C00"/>
    <text x="102" y="26" font-family="sans-serif" font-weight="700" font-size="20" fill="#FFF" text-anchor="middle">D</text>
  </g>
  <g transform="translate(640, 107)" opacity="0.15">
    <rect x="0"  y="0" width="36" height="36" rx="8" fill="#F57C00"/>
    <text x="18" y="26" font-family="sans-serif" font-weight="700" font-size="20" fill="#FFF" text-anchor="middle">R</text>
    <rect x="42" y="0" width="36" height="36" rx="8" fill="#F57C00"/>
    <text x="60" y="26" font-family="sans-serif" font-weight="700" font-size="20" fill="#FFF" text-anchor="middle">O</text>
    <rect x="84" y="0" width="36" height="36" rx="8" fill="#444"/>
    <text x="102" y="26" font-family="sans-serif" font-weight="700" font-size="20" fill="#888" text-anchor="middle">S</text>
  </g>
</svg>
